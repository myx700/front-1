<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة جهتي | تسجيل الدخول</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- Theme Styling --- */
        :root {
            --primary-dark: #0d5231;   
            --primary-accent: #1e8349; 
            --bg-light: #f4f7f5;       
            --text-dark: #1f2937;
            --border-color: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Decorative background elements */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e8349 0%, #0d5231 100%);
            z-index: -1;
            opacity: 0.06;
        }

        /* Centered Authentication Card */
        .auth-container {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 40px 35px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(13, 82, 49, 0.06);
            border-top: 5px solid var(--primary-dark);
            text-align: center;
        }

        .auth-header {
            margin-bottom: 30px;
        }

        .auth-header svg {
            fill: none;
            stroke: var(--primary-accent);
            stroke-width: 2;
            width: 40px;
            height: 40px;
            margin-bottom: 10px;
        }

        .auth-container h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 5px;
        }

        .sub-heading {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 600;
        }

        #auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 25px;
        }

        #auth-form input {
            width: 100%;
            padding: 12px 16px;
            font-size: 0.95rem;
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            background-color: #f8fafc;
            color: var(--text-dark);
            transition: all 0.2s ease;
            text-align: right;
        }

        #auth-form input:focus {
            outline: none;
            border-color: var(--primary-accent);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(30, 131, 73, 0.15);
        }

        .btn-primary {
            background-color: var(--primary-accent);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(30, 131, 73, 0.2);
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        #toggle-auth {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary-accent) !important; 
            transition: color 0.2s;
            cursor: pointer;
        }

        #toggle-auth:hover {
            color: var(--primary-dark) !important;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="bg-circle" style="width: 400px; height: 400px; top: -150px; left: -150px;"></div>
    <div class="bg-circle" style="width: 250px; height: 250px; bottom: -50px; right: -50px;"></div>

    <div class="auth-container">
        <div class="auth-header">
            <svg viewBox="0 0 24 24">
                <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" />
            </svg>
            <h2>منصة جهتي</h2>
       
        </div>

        <form id="auth-form">
            <input type="text" id="name" placeholder="الاسم الكامل (للتسجيل فقط)" style="display:none;">
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="password" placeholder="كلمة المرور" required>
            <button type="submit" class="btn-primary" id="auth-btn">تسجيل الدخول</button>
        </form>
        
        <p id="toggle-auth">ليس لديك حساب؟ إنشاء حساب جديد</p>
    </div>

    <script>
        let isLogin = true;
        document.getElementById('toggle-auth').onclick = (e) => {
            isLogin = !isLogin;
            document.getElementById('name').style.display = isLogin ? 'none' : 'block';
            document.getElementById('auth-btn').innerText = isLogin ? 'تسجيل الدخول' : 'إنشاء حساب';
            e.target.innerText = isLogin ? 'ليس لديك حساب؟ إنشاء حساب جديد' : 'لدي حساب بالفعل، تسجيل الدخول';
        };

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            
            const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
            const body = isLogin ? {email, password} : {name, email, password};

            const res = await fetch(endpoint, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            const data = await res.json();
            
            if(res.ok) {
                if(isLogin) {
                    localStorage.setItem('token', data.token); 
                    localStorage.setItem('userName', data.name);
                    window.location.href = '/dashboard'; 
                } else {
                    alert("تم إنشاء الحساب بنجاح! يرجى تسجيل الدخول الآن.");
                    window.location.reload();
                }
            } else {
                alert(data.error);
            }
        };
    </script>
</body>
</html>
